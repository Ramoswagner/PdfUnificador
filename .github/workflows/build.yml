name: 🔨 Build & Release

on:
  push:
    branches: [ "main", "develop" ]
    tags:
      - 'v*.*.*'
  pull_request:
    branches: [ "main" ]

env:
  PROJECT_PATH: src/PdfUnificador/PdfUnificador.csproj
  DOTNET_VERSION: '8.0.x'
  BUILD_CONFIG: Release
  RUNTIME: win-x64

jobs:
  # ════════════════════════════════════════════════
  #  BUILD + TEST
  # ════════════════════════════════════════════════
  build:
    name: 🏗️ Build
    runs-on: windows-latest

    steps:
      - name: ⬇️ Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 🔧 Setup .NET ${{ env.DOTNET_VERSION }}
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: 📦 Restore dependencies
        run: dotnet restore ${{ env.PROJECT_PATH }}

      - name: 🏗️ Build
        run: |
          dotnet build ${{ env.PROJECT_PATH }} `
            --configuration ${{ env.BUILD_CONFIG }} `
            --no-restore `
            -p:TreatWarningsAsErrors=false

      - name: 📤 Upload build artifact (debug check)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: build-output
          path: src/PdfUnificador/bin/${{ env.BUILD_CONFIG }}/
          retention-days: 5

  # ════════════════════════════════════════════════
  #  PUBLISH (self-contained .exe)
  # ════════════════════════════════════════════════
  publish:
    name: 📦 Publish
    runs-on: windows-latest
    needs: build
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/'))

    steps:
      - name: ⬇️ Checkout
        uses: actions/checkout@v4

      - name: 🔧 Setup .NET ${{ env.DOTNET_VERSION }}
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: 📦 Restore
        run: dotnet restore ${{ env.PROJECT_PATH }}

      - name: 🚀 Publish (self-contained single file)
        run: |
          dotnet publish ${{ env.PROJECT_PATH }} `
            --configuration ${{ env.BUILD_CONFIG }} `
            --runtime ${{ env.RUNTIME }} `
            --self-contained true `
            -p:PublishSingleFile=true `
            -p:IncludeNativeLibrariesForSelfExtract=true `
            -p:EnableCompressionInSingleFile=true `
            --output ./publish

      - name: 🗜️ Zip artifact
        shell: pwsh
        run: |
          Compress-Archive -Path ./publish/* -DestinationPath ./PdfUnificador-win-x64.zip

      - name: 📤 Upload publish artifact
        uses: actions/upload-artifact@v4
        with:
          name: PdfUnificador-win-x64
          path: PdfUnificador-win-x64.zip
          retention-days: 30

  # ════════════════════════════════════════════════
  #  RELEASE (only on tag push like v1.0.0)
  # ════════════════════════════════════════════════
  release:
    name: 🎉 GitHub Release
    runs-on: windows-latest
    needs: publish
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
      - name: ⬇️ Checkout
        uses: actions/checkout@v4

      - name: 🔧 Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: 📦 Restore
        run: dotnet restore ${{ env.PROJECT_PATH }}

      - name: 🚀 Publish para release
        run: |
          dotnet publish ${{ env.PROJECT_PATH }} `
            --configuration ${{ env.BUILD_CONFIG }} `
            --runtime ${{ env.RUNTIME }} `
            --self-contained true `
            -p:PublishSingleFile=true `
            -p:IncludeNativeLibrariesForSelfExtract=true `
            -p:EnableCompressionInSingleFile=true `
            --output ./publish

      - name: 🗜️ Zip para release
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          Compress-Archive -Path ./publish/* -DestinationPath "PdfUnificador-$tag-win-x64.zip"

      - name: 📝 Extrair notas do CHANGELOG
        id: changelog
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          $notes = "## PDF Unificador $tag`n`n"
          $notes += "### 📦 Download`n"
          $notes += "Baixe o arquivo ``PdfUnificador-$tag-win-x64.zip``, extraia e execute ``PdfUnificador.exe``."
          $notes += "`n`n### ✅ Requisitos`n- Windows 10/11 x64`n- Sem necessidade de instalar .NET (self-contained)"
          echo "NOTES=$notes" >> $env:GITHUB_OUTPUT

      - name: 🎉 Criar GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "PDF Unificador ${{ github.ref_name }}"
          body: ${{ steps.changelog.outputs.NOTES }}
          draft: false
          prerelease: ${{ contains(github.ref_name, '-beta') || contains(github.ref_name, '-rc') }}
          files: |
            PdfUnificador-${{ github.ref_name }}-win-x64.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
